<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish and Chips (Cartier)</title>
    <link rel="stylesheet" href="style.css">

<style>
    body{
        max-width: 50rem;
        margin: auto;
    }
    .color{
        width: max-content;
    }

.swatch{
    width: 2.54cm ;
    aspect-ratio: 1;
}
.label{
    font-family: monospace;
    border-top: 1px solid #ccc;
    padding-top: 0.5em;
    margin-top: 0.5em;
}

</style>

</head>
<body>
   <img src="logo.svg" alt="">

<section>#CharteGraphique

    <article id="couleur">
        <h2>couleur</h2>

        <script src="swatches.js"></script>



        <div class="color">
            <h3>Couleur Principale = Rose</h3>
            <div class="swatch" style= "background: var(--couleurPrincipale);" ></div>
            <p class="label" data-color-format="hsl"></p>
            <p class="label" data-color-format="hex"></p>
            <p class="label" data-color-format="cmyk"></p>
            <p class="label" data-color-format="rgb"></p>
            <p class="label" data-color-format="lab"></p>
        </div>

         <div class="color">
            <h3>Couleur Secondaire = bleu</h3>
            <div class="swatch" style= "background: var(--couleurSecondaire);" ></div>
            <p class="label" data-color-format="hsl"></p>
            <p class="label" data-color-format="hex"></p>
            <p class="label" data-color-format="cmyk"></p>
            <p class="label" data-color-format="rgb"></p>
            <p class="label" data-color-format="lab"></p>
        </div>

        <div class="color">
            <h3>Mix</h3>
            <div class="swatch" style="background: color-mix(in srgb, var(--couleurPrincipale), var(--couleurSecondaire)) ;"></div>
            <p class="label" data-color-format="hsl"></p>
            <p class="label" data-color-format="hex"></p>
            <p class="label" data-color-format="cmyk"></p>
            <p class="label" data-color-format="rgb"></p>
            <p class="label" data-color-format="lab"></p>
        </div>

          <div class="color">
            <h3>Fiesta Obscur</h3>
            <div class="swatch" style="background-color: hsl(from pink h 100% 33%);"></div>
            <p class="label" data-color-format="hsl"></p>
            <p class="label" data-color-format="hex"></p>
            <p class="label" data-color-format="cmyk"></p>
            <p class="label" data-color-format="rgb"></p>
            <p class="label" data-color-format="lab"></p>
        </div>

    </article>

</section>

</body>
</html>
